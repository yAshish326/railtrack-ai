spring.application.name=railtrack-backend
server.port=${PORT:8081}

# =====================================================
# PostgreSQL Configuration
# =====================================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# =====================================================
# JPA
# =====================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =====================================================
# Rapid API
# =====================================================
rapidapi.base-url=https://irctc-indian-railway-pnr-status.p.rapidapi.com
rapidapi.host=irctc-indian-railway-pnr-status.p.rapidapi.com
rapidapi.key=${RAPIDAPI_KEY}

# =====================================================
# API FOR train between stations
# =====================================================
railway.api.base-url=https://api.railradar.in/v1
railway.api.key=${RAILRADAR_API_KEY}

# =====================================================
# JWT
# =====================================================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# =====================================================
# Google Gemini Configuration
# =====================================================
spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.chat.options.model=gemini-2.5-flash
spring.ai.google.genai.chat.options.temperature=0.7